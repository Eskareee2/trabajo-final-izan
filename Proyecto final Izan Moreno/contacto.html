<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - IES El Caminás</title>
    <link rel="stylesheet" href="estilos.css">

    <link rel="icon" type="image/x-icon" href="icono.ico">

</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="estudios.html">Oferta Educativa</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <section id="formulario">
        <h2>Formulario de Matriculación</h2>
        <form action="https://registro.com" method="POST">
            <fieldset>
                <legend>Datos Personales</legend>
                
                <div class="campo">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="user_name" required>
                </div>

                <div class="campo">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="user_email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="campo">
                    <label for="fecha_nac">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha_nac" name="user_birth">
                </div>

                <div class="campo">
                    <label for="curso">Selecciona tu Ciclo:</label>
                    <select id="curso" name="user_course">
                        <option value="dam">Desarrollo de Aplicaciones Multiplataforma</option>
                        <option value="daw">Desarrollo de Aplicaciones Web</option>
                        <option value="asix">Administración de Sistemas Informáticos</option>
                    </select>
                </div>

                <div class="campo">
                    <input type="checkbox" id="privacidad" name="privacy" required>
                    <label for="privacidad" style="display: inline;">Acepto la política de privacidad (obligatorio)</label>
                </div>

                <div id="enviar">
                    <button type="submit">Enviar Solicitud</button>
                </div>
            </fieldset>
        </form>
      <section>
    </main>
</body>
</html>
